name: Update Splatoon SVG

on:
  push:
    branches: [main]
  schedule:
    # Every 6 hours at minute 17 to dodge top-of-hour cron congestion
    # (03:17 / 09:17 / 15:17 / 21:17 JST).
    - cron: "17 */6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout contribution-gallery
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # The calendar/profile queries use GITHUB_TOKEN on purpose: an anonymous
      # viewer sees ALL private activity as anonymised counts (profile setting),
      # while a user token only sees the repos it can access. Only the review
      # search and the authored-issue total need the repo-scoped STATS_PAT
      # (private reviews/issues are invisible to an anonymous viewer).
      - name: Generate SVG (light mode)
        run: npx tsx src/cli.ts --user crosscore --token ${{ secrets.GITHUB_TOKEN }} --output docs/splatoon.svg

      - name: Generate SVG (dark mode)
        run: npx tsx src/cli.ts --user crosscore --token ${{ secrets.GITHUB_TOKEN }} --output docs/splatoon-dark.svg --dark

      - name: Generate ambient SVG (light mode) + grid data for the API
        run: npx tsx src/cli.ts --user crosscore --token ${{ secrets.GITHUB_TOKEN }} --mode ambient --output docs/ambient.svg --emit-grid docs/grid.json

      - name: Generate ambient SVG (dark mode)
        run: npx tsx src/cli.ts --user crosscore --token ${{ secrets.GITHUB_TOKEN }} --mode ambient --output docs/ambient-dark.svg --dark

      - name: Fetch profile stats for the streak & trophy card API
        run: npx tsx src/cli-stats.ts --user crosscore --token ${{ secrets.GITHUB_TOKEN }} --private-token ${{ secrets.STATS_PAT || secrets.GITHUB_TOKEN }} --output docs/stats.json

      - name: Commit updated docs/ SVGs (keep-alive)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/splatoon.svg docs/splatoon-dark.svg docs/ambient.svg docs/ambient-dark.svg docs/grid.json docs/stats.json
          git diff --staged --quiet || git commit -m "chore: regenerate SVGs with latest contributions [skip ci]"
          git push

      - name: Push SVG to crosscore/crosscore
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.PROFILE_REPO_TOKEN }}
        with:
          source_file: "docs/splatoon.svg"
          destination_repo: "crosscore/crosscore"
          destination_branch: "main"
          user_email: "github-actions[bot]@users.noreply.github.com"
          user_name: "github-actions[bot]"
          commit_message: "chore: update splatoon.svg [skip ci]"

      - name: Push dark SVG to crosscore/crosscore
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.PROFILE_REPO_TOKEN }}
        with:
          source_file: "docs/splatoon-dark.svg"
          destination_repo: "crosscore/crosscore"
          destination_branch: "main"
          user_email: "github-actions[bot]@users.noreply.github.com"
          user_name: "github-actions[bot]"
          commit_message: "chore: update splatoon-dark.svg [skip ci]"

      - name: Push ambient SVG to crosscore/crosscore
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.PROFILE_REPO_TOKEN }}
        with:
          source_file: "docs/ambient.svg"
          destination_repo: "crosscore/crosscore"
          destination_branch: "main"
          user_email: "github-actions[bot]@users.noreply.github.com"
          user_name: "github-actions[bot]"
          commit_message: "chore: update ambient.svg [skip ci]"

      - name: Push ambient dark SVG to crosscore/crosscore
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.PROFILE_REPO_TOKEN }}
        with:
          source_file: "docs/ambient-dark.svg"
          destination_repo: "crosscore/crosscore"
          destination_branch: "main"
          user_email: "github-actions[bot]@users.noreply.github.com"
          user_name: "github-actions[bot]"
          commit_message: "chore: update ambient-dark.svg [skip ci]"
